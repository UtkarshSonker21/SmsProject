            line-height: 1.3;

================================ */
        p {

            line-height: 1.6;
            margin-bottom: 0.75rem;
        }

        
        label,
        small,
        a {
            font-size: 0.95rem;
        }

        /* ================================
   Tables
================================ */
        .table th,
        .table td {
            font-size: 0.9rem; /* ~14.4px */
        }

        /* ================================
   Forms
================================ */
        input,
        select,
        textarea {
            font-size: 0.9rem;
        }

        /* ================================
   Buttons
================================ */
        .btn {
            font-size: 0.9rem;
            font-weight: 500;
        }
